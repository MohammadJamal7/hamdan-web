<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1976d2">
    <title>حمدان - تسجيل الدخول</title>
    <!-- Bootstrap RTL CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Theme Manager for Dark Mode - Load early -->
    <script src="js/theme-manager.js"></script>
    <style>
        /* ===== CUSTOM FONTS ===== */
        @font-face {
            font-family: 'Hayah';
            src: url('fonts/66Hayah.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* ===== CSS CUSTOM PROPERTIES (Variables) ===== */
        /* Light Mode (default) */
        :root {
            --primary-color: #004052;
            --primary-hover: #003040;
            --secondary-color: #00a8cc;
            --danger-color: #dc3545;
            --success-color: #28a745;
            --warning-color: #ffc107;
            
            /* Backgrounds */
            --bg-page: #f5f7fa;
            --bg-card: #ffffff;
            --bg-input: #fffaed;
            --bg-input-focus: #fff8e1;
            
            /* Text Colors */
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-muted: #999999;
            
            /* Borders */
            --border-color: #dddddd;
            --border-light: #eeeeee;
            
            /* Shadows */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        /* Dark Mode */
        [data-theme="dark"] {
            --primary-color: #00a8cc;
            --primary-hover: #0098b8;
            --secondary-color: #00d4ff;
            --danger-color: #ff6b6b;
            --success-color: #51cf66;
            --warning-color: #ffd43b;
            
            /* Backgrounds */
            --bg-page: #0f1419;
            --bg-card: #1a2332;
            --bg-input: #262d3f;
            --bg-input-focus: #2d3550;
            
            /* Text Colors */
            --text-primary: #e8eaed;
            --text-secondary: #a8aeb5;
            --text-muted: #7a7f8a;
            
            /* Borders */
            --border-color: #2d3142;
            --border-light: #383f52;
            
            /* Shadows */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        /* ===== RESET & BASE STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Hayah', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1rem;
            line-height: 1.5;
            background-color: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Smooth theme transitions */
        * {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* Disable transitions during theme switch */
        html.theme-switching * {
            transition: none !important;
        }

        /* ===== THEME TOGGLE BUTTON ===== */
        .theme-toggle-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background-color: var(--bg-card);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 15px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
        }

        .theme-toggle-btn:hover {
            background-color: var(--bg-input);
            border-color: var(--primary-color);
            color: var(--primary-color);
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        .theme-toggle-btn:active {
            transform: translateY(-1px);
        }

        /* ===== LOGIN CONTAINER ===== */
        .login-wrapper {
            width: 100%;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background-color: var(--bg-card);
            border-radius: 15px;
            padding: 50px 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-light);
        }

        /* ===== LOGO SECTION ===== */
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-section img {
            max-width: 120px;
            height: auto;
            margin-bottom: 20px;
        }

        .app-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .login-subtitle {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 25px;
        }

        /* ===== FORM STYLES ===== */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group-login {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label-login {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-align: center;
        }

        /* ===== INPUT FIELDS ===== */
        .input-field {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background-color: var(--bg-input);
            color: var(--text-primary);
            font-family: inherit;
            transition: all 0.3s ease;
            text-align: right;
            direction: rtl;
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .input-field:focus {
            outline: none;
            background-color: var(--bg-input-focus);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 168, 204, 0.1);
        }

        .input-field:disabled {
            background-color: var(--border-light);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        /* Password Input Group */
        .password-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-group .input-field {
            width: 100%;
            padding-left: 45px;
            padding-right: 16px;
        }

        .password-toggle-btn {
            position: absolute;
            left: 12px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 1.1rem;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .password-toggle-btn:hover {
            color: var(--primary-color);
        }

        /* ===== CHECKBOX STYLES ===== */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 5px;
        }

        .checkbox-input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .checkbox-label {
            font-size: 0.95rem;
            color: var(--text-primary);
            cursor: pointer;
            user-select: none;
            margin: 0;
        }

        /* ===== ERROR ALERT ===== */
        .alert-error {
            padding: 12px 16px;
            background-color: rgba(220, 53, 69, 0.12);
            border: 2px solid var(--danger-color);
            border-radius: 8px;
            color: var(--danger-color);
            font-size: 0.95rem;
            text-align: center;
            display: none;
            margin-top: 10px;
        }

        .alert-error.show {
            display: block;
        }

        /* ===== LOGIN BUTTON ===== */
        .btn-login {
            width: 100%;
            padding: 14px 20px;
            font-size: 1.05rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary-color) 0%, #053040 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            background: linear-gradient(135deg, var(--primary-hover) 0%, #032030 100%);
        }

        .btn-login:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Loading spinner */
        .spinner-small {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== LINKS & TEXT ===== */
        .divider-text {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin: 15px 0;
        }

        .divider-text a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .divider-text a:hover {
            text-decoration: underline;
            color: var(--primary-hover);
        }

        /* ===== SUPPORT SECTION ===== */
        .support-section {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid var(--border-light);
            margin-top: 20px;
        }

        .support-section p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 12px;
        }

        .btn-support {
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            background-color: transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-support:hover {
            background-color: var(--primary-color);
            color: white;
            transform: translateY(-2px);
        }

        /* ===== TOAST NOTIFICATIONS ===== */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            pointer-events: none;
        }

        .toast-notification {
            background-color: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 10px;
            min-width: 320px;
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
            pointer-events: auto;
        }

        .toast-notification.success {
            border-left: 4px solid var(--success-color);
            color: var(--success-color);
        }

        .toast-notification.error {
            border-left: 4px solid var(--danger-color);
            color: var(--danger-color);
        }

        .toast-icon {
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .toast-message {
            flex: 1;
            font-size: 0.95rem;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .login-card {
                padding: 35px 25px;
            }

            .app-title {
                font-size: 1.5rem;
            }

            .login-subtitle {
                font-size: 1.1rem;
                margin-bottom: 20px;
            }

            .logo-section img {
                max-width: 100px;
            }

            .btn-login {
                font-size: 1rem;
                padding: 12px 16px;
            }

            .toast-notification {
                min-width: auto;
                width: calc(100vw - 40px);
                right: 20px;
                left: 20px;
            }

            .theme-toggle-btn {
                width: 45px;
                height: 45px;
                font-size: 1rem;
            }
        }

        /* ===== ACCESSIBILITY ===== */
        .input-field:focus,
        .btn-login:focus,
        .btn-support:focus,
        .theme-toggle-btn:focus {
            outline: 2px solid var(--primary-color);
            outline-offset: 2px;
        }

        button:not(:disabled) {
            cursor: pointer;
        }

        a {
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <!-- Theme Toggle Button -->
    <button class="theme-toggle-btn" data-theme-toggle title="تبديل الوضع">
        <i class="fas fa-moon"></i>
    </button>

    <!-- Toast Notifications Container -->
    <div class="toast-container"></div>

    <!-- Main Login Wrapper -->
    <div class="login-wrapper">
        <div class="login-card">
            <!-- Logo Section -->
            <div class="logo-section">
                <img src="images/logo.jpeg" alt="حمدان">
                <div class="app-title">حمدان</div>
            </div>

            <!-- Login Title -->
            <h2 class="login-subtitle">تسجيل الدخول</h2>

            <!-- Login Form -->
            <form id="loginForm" class="login-form">
                <!-- Username/Email Field -->
                <div class="form-group-login">
                    <label class="form-label-login">حط البريد الإلكتروني أو اسم المستخدم</label>
                    <input 
                        type="text" 
                        class="input-field" 
                        id="identifier" 
                        name="identifier"
                        placeholder="البريد الإلكتروني أو اسم المستخدم"
                        autocomplete="username"
                        required
                    />
                </div>

                <!-- Password Field -->
                <div class="form-group-login">
                    <label class="form-label-login">كلمة المرور</label>
                    <div class="password-group">
                        <input 
                            type="password" 
                            class="input-field" 
                            id="password" 
                            name="password"
                            placeholder="كلمة المرور"
                            autocomplete="current-password"
                            required
                        />
                        <button type="button" class="password-toggle-btn" id="togglePassword">
                            <i class="fas fa-eye-slash"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember Me Checkbox -->
                <div class="checkbox-group">
                    <label class="checkbox-label" for="rememberMe">
                        تذكر يوزري وكلمة السر عشان ما أنسى
                    </label>
                    <input 
                        type="checkbox" 
                        class="checkbox-input" 
                        id="rememberMe"
                        name="rememberMe"
                    />
                </div>

                <!-- Error Alert -->
                <div class="alert-error" id="loginError"></div>

                <!-- Login Button -->
                <button type="submit" class="btn-login" id="loginButton">
                    تسجيل الدخول
                </button>
            </form>

            <!-- Divider with Register Link -->
            <div class="divider-text">
                ماعندك حساب؟ <a href="register.html">سوي حساب جديد</a>
            </div>

            <!-- Support Section -->
            <div class="support-section">
                <p>تحتاج مساعدة؟</p>
                <a href="http://t.me/hamdan2S" target="_blank" class="btn-support">
                    <i class="fab fa-telegram"></i> تواصل مع فريق الدعم
                </a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Device ID Generator -->
    <script src="js/deviceId.js"></script>

    <script>
        // Toast notification function
        function showToast(message, type = 'success') {
            const container = document.querySelector('.toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-notification ${type}`;
            
            const icon = type === 'success' ? 'check-circle' : 'times-circle';
            const iconClass = type === 'success' ? 'fas' : 'fas';
            
            toast.innerHTML = `
                <i class="${iconClass} fa-${icon} toast-icon"></i>
                <span class="toast-message">${message}</span>
            `;
            
            container.appendChild(toast);
            
            // Auto remove after 4 seconds
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Check if user is already logged in
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            if (token) {
                window.location.href = 'dashboard.html';
                return;
            }

            // Password visibility toggle
            const toggleBtn = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');

            if (toggleBtn && passwordInput) {
                toggleBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const type = passwordInput.type === 'password' ? 'text' : 'password';
                    passwordInput.type = type;
                    
                    const icon = toggleBtn.querySelector('i');
                    if (type === 'password') {
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                    } else {
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                    }
                });
            }

            // Login form submission
            const loginForm = document.getElementById('loginForm');
            const loginButton = document.getElementById('loginButton');
            const loginError = document.getElementById('loginError');

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const identifier = document.getElementById('identifier').value.trim();
                const password = document.getElementById('password').value;
                const rememberMe = document.getElementById('rememberMe').checked;

                // Validation
                if (!identifier || !password) {
                    showToast('يرجى ملء جميع الحقول المطلوبة', 'error');
                    loginError.textContent = 'يرجى ملء جميع الحقول المطلوبة';
                    loginError.classList.add('show');
                    return;
                }

                try {
                    // Show loading state
                    const originalText = loginButton.innerHTML;
                    loginButton.innerHTML = '<div class="spinner-small"></div> جاري التحميل...';
                    loginButton.disabled = true;
                    loginError.classList.remove('show');

                    // Get device ID
                    const deviceId = window.getDeviceId?.() || 'unknown';

                    // Make login request
                    const response = await fetch('https://api.hamdan.help/api/students/flexible-login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            identifier,
                            password,
                            deviceId
                        })
                    });

                    const data = await response.json();

                    if (response.ok && data.success) {
                        // Store token and user info
                        localStorage.setItem('token', data.data.token);
                        localStorage.setItem('user', JSON.stringify(data.data.student));
                        
                        if (rememberMe) {
                            localStorage.setItem('rememberMe', 'true');
                        }

                        showToast('تم تسجيل الدخول بنجاح', 'success');
                        
                        // Redirect after a short delay
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1500);
                    } else {
                        const errorMessage = data.message || 'اسم المستخدم أو كلمة المرور غير صحيحة';
                        showToast(errorMessage, 'error');
                        loginError.textContent = errorMessage;
                        loginError.classList.add('show');
                        
                        loginButton.innerHTML = originalText;
                        loginButton.disabled = false;
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    const errorMessage = 'حدث خطأ أثناء الاتصال بالخادم. حاول مرة أخرى.';
                    showToast(errorMessage, 'error');
                    loginError.textContent = errorMessage;
                    loginError.classList.add('show');
                    
                    loginButton.innerHTML = originalText;
                    loginButton.disabled = false;
                }
            });

            // Pre-fill remember me if checked before
            if (localStorage.getItem('rememberMe') === 'true') {
                document.getElementById('rememberMe').checked = true;
            }
        });
    </script>
</body>
</html>
